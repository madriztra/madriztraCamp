services:
  app:
    build: .
    depends_on:
      - mongo
      - redis
      - minio
    env_file:
      - .env
    ports:
      - "3000:3000"

  worker:
    build: .
    command: npm run worker
    depends_on:
      - mongo
      - redis
    env_file:
      - .env

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      mc mb --ignore-existing local/music-growth-os;
      mc anonymous set download local/music-growth-os;
      "

volumes:
  mongo-data:
  minio-data:
